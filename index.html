<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abel Study Planner</title>
<link rel="stylesheet"href="stud.css">
</head>
<body>
<!-- LOGIN PAGE -->
 
<div id="loginPage" class="login-page">

    <div class="login-box">

        <h2>📚 Abel Study Planner</h2>

        <input type="text"
        id="username"
        placeholder="Username">

        <input type="password"
        id="password"
        placeholder="Password">

        <button id="loginBtn" onclick="login()">Login</button>

        <p id="error" style="color:red;"></p>

    </div>

    <button class="signup-btn"
    onclick="showSignup()">
    Create Account
    </button>

<div id="signupPage"
class="login-page"
style="display:none;">

    <div class="login-box">

        <h2>Create Account</h2>

        <input type="text"
        id="newUser"
        placeholder="Username">

        <input type="password"
        id="newPass"
        placeholder="Password">

        <button onclick="signup()">
        Register
        </button>

        <button onclick="showLogin()">
        Back to Login
        </button>

    </div>

</div>
<!-- STUDY PLANNER -->

<div class="container"
id="planner"
style="display:none;">

    <h2 id="welcomeUser"></h2>

    <div class="profile">
        <img id="profilePic"
        src="https://via.placeholder.com/100"
        alt="Profile">

        <input type="file"
        id="fileInput"
        accept="image/*"
        onchange="loadImage(event)">
    </div>

    <marquee>
        <p id="quote"></p>
    </marquee>

    <div class="header">
        <h1>📚 Abel Study Planner</h1>
        <p>University + Project Manager</p>
    </div>

   <div class="card">

    <h2>📅 IBIKORWA MFITE GUKORA MURI IKI CYUMWERU</h2>

    <input
        type="text"
        id="taskName"
        placeholder="Andika igikorwa..."
    >
<br><br>


<label>Itariki:</label>
    <input type="date" id="taskDate">

 

    <br><br>

    <label>Isaha:</label>

    <select id="taskHour">
<option value="01">01</option>
        <option value="08">08</option>
        <option value="09">09</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
    </select>

    <label>Iminota:</label>

    <select id="taskMinute">
        <option value="00">00</option>
        <option value="05">05</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="25">25</option>
        <option value="30">30</option>
        <option value="35">35</option>
        <option value="40">40</option>
        <option value="45">45</option>
        <option value="50">50</option>
        <option value="55">55</option>
    </select>

    <br><br>

    <button class="main-btn" onclick="addTask()">
        ➕ Add Task
    </button>

</div>

    <div class="card">
        <h2>My Tasks</h2>
        <div id="taskList"></div>
    </div>
<div class="card">

    <h2>SHYIRAMO NOTE</h2>
<input type="file" id="fileUpload" accept="*/*">

    <button onclick="uploadFile()" class="main-btn">
        Upload File
    </button>

    <h2>My Study Materials</h2>
<div id="fileList"></div>
<button onclick="openSavedPDF(0)">
    Open PDF (test)
</button>

</div>
<div class="card">
    <h3>URWIBUTSO TV</h3>

    <iframe
        id="pdfFrame"
        style="width:100%;height:500px;border:none;">
    </iframe>

</div>
<button class="main-btn logout-btn"
        onclick="logout()">
        Logout
        </button>
<p id="clock"></p>
<script type="module" src="stud.js"></script>
</body>
</html>
